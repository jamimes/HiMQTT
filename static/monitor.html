<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HiMQTT 监控</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2f;
      --border: #24304d;
      --text: #e8eefc;
      --muted: #8fa0c3;
      --accent: #4f8cff;
      --green: #3ddc84;
      --orange: #ffb020;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      background: linear-gradient(180deg, #101831, var(--bg));
    }
    header h1 { margin: 0; font-size: 1.25rem; }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
    }
    .dot.off { background: #ff5d5d; box-shadow: 0 0 10px #ff5d5d; }
    main { padding: 20px 24px 32px; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
    }
    .card .label { color: var(--muted); font-size: 0.85rem; margin-bottom: 8px; }
    .card .value { font-size: 1.8rem; font-weight: 700; }
    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
    }
    @media (max-width: 960px) { .layout { grid-template-columns: 1fr; } }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .panel-head h2 { margin: 0; font-size: 1rem; }
    .toolbar { display: flex; gap: 8px; align-items: center; }
    button, label {
      background: #182342;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; position: sticky; top: 0; background: var(--panel); }
    .topic { color: var(--accent); word-break: break-all; }
    .payload {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 520px;
    }
    .scroll-box { max-height: 62vh; overflow: auto; }
    .topics { list-style: none; margin: 0; padding: 8px 0; }
    .topics li {
      display: flex; justify-content: space-between; gap: 12px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .topics li span:last-child { color: var(--orange); font-weight: 600; }
    .empty { color: var(--muted); padding: 24px 16px; }
  </style>
</head>
<body>
  <header>
    <h1>HiMQTT 实时监控</h1>
    <div class="status"><span id="liveDot" class="dot off"></span><span id="liveText">连接中…</span></div>
  </header>
  <main>
    <section class="cards">
      <div class="card"><div class="label">当前连接数</div><div id="connections" class="value">0</div></div>
      <div class="card"><div class="label">订阅活跃数</div><div id="subscriptions" class="value">0</div></div>
      <div class="card"><div class="label">累计消息</div><div id="totalMessages" class="value">0</div></div>
      <div class="card"><div class="label">近 1 分钟消息</div><div id="minuteMessages" class="value">0</div></div>
    </section>

    <section class="layout">
      <div class="panel">
        <div class="panel-head">
          <h2>实时消息</h2>
          <div class="toolbar">
            <label><input type="checkbox" id="autoScroll" checked /> 自动滚动</label>
            <button id="clearBtn" type="button">清空视图</button>
          </div>
        </div>
        <div class="scroll-box">
          <table>
            <thead>
              <tr><th>时间</th><th>Topic</th><th>Payload</th><th>大小</th></tr>
            </thead>
            <tbody id="messages"></tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><h2>热门 Topic</h2></div>
        <ul id="topics" class="topics"></ul>
      </div>
    </section>
  </main>

  <script>
    const messagesEl = document.getElementById('messages');
    const topicsEl = document.getElementById('topics');
    const liveDot = document.getElementById('liveDot');
    const liveText = document.getElementById('liveText');
    const autoScroll = document.getElementById('autoScroll');
    const clearBtn = document.getElementById('clearBtn');
    const maxRows = 200;
    let localRows = [];

    function fmtTime(ts) {
      return new Date(Number(ts)).toLocaleTimeString('zh-CN', { hour12: false });
    }

    function renderStats(stats) {
      document.getElementById('connections').textContent = stats.total_connections ?? 0;
      document.getElementById('subscriptions').textContent = stats.total_subscriptions ?? 0;
      document.getElementById('totalMessages').textContent = stats.total_messages ?? 0;
      document.getElementById('minuteMessages').textContent = stats.messages_last_minute ?? 0;

      topicsEl.innerHTML = '';
      const tops = stats.top_topics || [];
      if (!tops.length) {
        topicsEl.innerHTML = '<li class="empty">暂无数据</li>';
        return;
      }
      for (const item of tops) {
        const li = document.createElement('li');
        li.innerHTML = `<span>${item.topic}</span><span>${item.count}</span>`;
        topicsEl.appendChild(li);
      }
    }

    function appendMessage(msg) {
      localRows.push(msg);
      if (localRows.length > maxRows) localRows.shift();

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${fmtTime(msg.ts)}</td>
        <td class="topic">${msg.topic}</td>
        <td class="payload">${escapeHtml(msg.payload)}</td>
        <td>${msg.payload_bytes} B</td>`;
      messagesEl.prepend(tr);
      while (messagesEl.children.length > maxRows) {
        messagesEl.removeChild(messagesEl.lastChild);
      }
      if (autoScroll.checked) {
        messagesEl.parentElement.scrollTop = 0;
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    clearBtn.addEventListener('click', () => {
      localRows = [];
      messagesEl.innerHTML = '';
    });

    async function bootstrap() {
      const [statsRes, msgRes] = await Promise.all([
        fetch('/api/stats'),
        fetch('/api/messages'),
      ]);
      renderStats(await statsRes.json());
      for (const msg of await msgRes.json()) appendMessage(msg);
    }

    function connectEvents() {
      const es = new EventSource('/api/events');
      es.onopen = () => {
        liveDot.classList.remove('off');
        liveText.textContent = '实时连接中';
      };
      es.onerror = () => {
        liveDot.classList.add('off');
        liveText.textContent = '连接断开，重试中…';
      };
      es.onmessage = (ev) => {
        const data = JSON.parse(ev.data);
        if (data.type === 'stats') renderStats(data.stats);
        if (data.type === 'message') appendMessage(data.message);
      };
    }

    bootstrap().then(connectEvents);
  </script>
</body>
</html>
